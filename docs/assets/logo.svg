<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 260" role="img" aria-labelledby="title desc">
  <title id="title">phux wordmark</title>
  <desc id="desc">The phux wordmark with a lime wire path linking terminal panes to an agent node.</desc>
  <defs>
    <linearGradient id="surface" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#171b23"/>
      <stop offset="1" stop-color="#090b0f"/>
    </linearGradient>
    <linearGradient id="wire" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0" stop-color="#bef264"/>
      <stop offset="0.5" stop-color="#86efac"/>
      <stop offset="1" stop-color="#bef264"/>
    </linearGradient>
    <filter id="softShadow" x="-10%" y="-20%" width="120%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#000000" flood-opacity="0.32"/>
    </filter>
  </defs>

  <rect width="960" height="260" rx="34" fill="#090b0f"/>
  <rect x="18" y="18" width="924" height="224" rx="26" fill="url(#surface)" stroke="#343a46"/>

  <g filter="url(#softShadow)">
    <rect x="70" y="58" width="220" height="142" rx="16" fill="#11141b" stroke="#343a46"/>
    <rect x="91" y="84" width="74" height="38" rx="8" fill="#171b23" stroke="#242936"/>
    <rect x="184" y="84" width="74" height="38" rx="8" fill="#171b23" stroke="#242936"/>
    <rect x="91" y="142" width="167" height="32" rx="8" fill="#171b23" stroke="#242936"/>
    <path d="M110 103h36M203 103h36M116 158h124" stroke="#697386" stroke-width="7" stroke-linecap="round"/>
  </g>

  <path d="M290 130H356C384 130 396 96 424 96H472" fill="none" stroke="url(#wire)" stroke-width="10" stroke-linecap="round"/>
  <circle cx="290" cy="130" r="12" fill="#bef264"/>
  <circle cx="472" cy="96" r="12" fill="#bef264"/>
  <circle cx="356" cy="130" r="6" fill="#86efac"/>

  <text x="510" y="156"
        fill="#f4f7fb"
        font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace"
        font-size="96"
        font-weight="700"
        letter-spacing="0">phux</text>
  <text x="516" y="190"
        fill="#9aa4b2"
        font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace"
        font-size="22"
        letter-spacing="0">terminal objects on a wire</text>
</svg>
