[package]
name = "phux-server"
description = "phux daemon: owns PTYs, terminal grids, and client IPC."
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
authors.workspace = true

[lints]
workspace = true

[dependencies]
phux-protocol.workspace = true
phux-core.workspace = true
thiserror.workspace = true
tracing.workspace = true

# Pinned to upstream master at 2026-05-22 — latest with link-static, png,
# log, and kitty-graphics features. Build requires zig 0.15.x on PATH;
# the nix dev shell provides it.
libghostty-vt = { git = "https://github.com/Uzaaft/libghostty-rs.git", rev = "31d1f70004ff80727e36437cd540984f927333ce", default-features = false }

[[example]]
name = "diff_spike"
path = "examples/diff_spike.rs"
