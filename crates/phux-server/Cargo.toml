[package]
name = "phux-server"
description = "phux daemon: owns PTYs, terminal grids, and client IPC."
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
authors.workspace = true

[lints]
workspace = true

[dependencies]
phux-protocol.workspace = true
phux-core.workspace = true
thiserror.workspace = true
tracing.workspace = true

# libghostty-vt is workspace-pinned (see workspace Cargo.toml). Build
# requires zig 0.15.x on PATH; the nix dev shell provides it.
libghostty-vt.workspace = true

[[example]]
name = "diff_spike"
path = "examples/diff_spike.rs"
