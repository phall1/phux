[package]
name = "phux-server"
description = "phux daemon: owns PTYs, terminal grids, and client IPC."
publish = false
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
authors.workspace = true

[lints]
workspace = true

[dependencies]
phux-protocol = { workspace = true, features = ["server"] }
phux-core.workspace = true
thiserror.workspace = true
tracing.workspace = true
tokio.workspace = true
bytes.workspace = true

# libghostty-vt is workspace-pinned (see workspace Cargo.toml). Build
# requires zig 0.15.x on PATH; the nix dev shell provides it.
libghostty-vt.workspace = true

[dev-dependencies]
insta.workspace = true
criterion.workspace = true
dhat.workspace = true
portable-pty.workspace = true
tokio.workspace = true
tempfile = "3"

[[example]]
name = "one_pane"
path = "examples/one_pane.rs"

[[bench]]
name = "capture"
harness = false
