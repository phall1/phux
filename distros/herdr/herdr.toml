# herdr — the phux starter distribution.
#
# A curated config layer in the spirit of a lazyvim starter: opinionated
# keybindings, a status-bar lineup, a theme, and the demo plugin set
# wired in. Your config extends this file (ADR-0039), so every key here
# is a plain override: your own config.toml still wins per key, and a
# herdr update reaches you without re-scaffolding.
#
# Get it:
#   phux config init --distro herdr
# or point an existing config at it:
#   extends = ["/path/to/distros/herdr/herdr.toml"]

[defaults]
# Name auto-created sessions after the directory you launched from, so a
# bench of project checkouts reads as its directories, not "default".
session-name-template = "${cwd-basename}"

[keybindings]
# herdr leans on the which-key popup as its discovery surface: press the
# prefix and hesitate and every continuation pops up, including the
# additions below. Snappier than the stock 600 ms.
which-key-delay-ms = 400

[keybindings.prefix-table]
# Additions merge into the shipped prefix table chord-by-chord (tables
# merge per key across layers); everything in the phux defaults still
# applies. `phux config show` prints the effective table.
#
# Space: the command palette, herdr's main verb. The actions contributed
# by the plugins wired below — continuum's autosave/restore, the
# agent-tools bench helpers — appear there automatically as `plugin:` rows.
"Space" = "command-palette"

# Ergonomic split aliases: the chord mirrors the divider it creates.
# The shipped tmux-style " and % bindings keep working.
"|" = { action = "split-pane", direction = "vertical" }
"-" = { action = "split-pane", direction = "horizontal" }

# Tab: hop to the next window, matching tabbed-UI muscle memory
# (n / p remain the shipped cycle bindings).
"Tab" = "next-window"

[status]
# Status lineup: window tabs left (herdr-styled active tab), contextual
# help hints center, session name + clock right. A distro owns the slot
# lists outright (plain assignment); use `-append` in your own config to
# add widgets beside these instead of replacing them.
left = [
  { kind = "windows", active = { fg = "#1a1b26", bg = "#7aa2f7", bold = true }, inactive = { fg = "#565f89" }, separator = " " },
]
center = [{ kind = "help-hints" }]
right = ["session-name", { kind = "time", format = " %a %H:%M" }]

[theme]
# Chrome + overlay palette (docs/consumers/tui.md section 4.4): a cool
# blue accent matching the tab colors above, warm amber for attention.
accent = "#7aa2f7"
title = "#7aa2f7"
chord = "#9ece6a"
border = "#3b4261"
section_header = "#e0af68"
attention = "#ff9e64"

# The herdr plugin set: workspace autosave/restore (continuum) and the
# agent bench helpers (agent-tools). `-append` contributes entries to
# [[plugins]] without erasing what your config or another layer declares.
# Relative manifest paths in a layer resolve against the layer file's own
# directory, so this wiring works no matter where your config.toml lives —
# provided the distro stays inside a phux checkout (the manifests live
# under the sibling examples/plugins/ tree). If you copy herdr elsewhere,
# copy those plugin directories too and update these two paths.

[[plugins-append]]
manifest = "../../examples/plugins/continuum/phux-plugin.toml"

[[plugins-append]]
manifest = "../../examples/plugins/agent-tools/phux-plugin.toml"
