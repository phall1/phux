# Crate-only fallback for publishing phux-protocol to crates.io.
#
# Only phux-protocol is publishable: every other workspace crate is
# publish=false (binary or internal-only). phux-protocol's default feature set
# is a near-empty shell, so it packages cleanly (ADR-0011); its `server`
# feature's optional libghostty-vt resolves to the crates.io release (>=0.2.0)
# for external consumers.
#
# This is the ONLY path that publishes to crates.io. release.yml deliberately
# does not: it is driven by release-please (automation), and an irreversible
# publish must stay behind a human. Publishing is irreversible — versions cannot
# be reused, names cannot be reclaimed — so this never fires on push.
#
# Requires the CARGO_REGISTRY_TOKEN secret (a crates.io API token). Dispatch it
# with the matching `v*` tag after `docs/spec` + the version are settled, once
# release-please has tagged the release.
#
# The publish job runs in the `crates-io` GitHub Environment. Configure that
# environment with a required reviewer and scope CARGO_REGISTRY_TOKEN to it, so
# an upload needs a second pair of eyes and the token is unreachable from any
# other workflow.

name: publish-crate

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to publish from (e.g. v0.1.0). Must already exist."
        required: true
        type: string
      dry_run:
        description: "Package + verify only; do not upload."
        type: boolean
        default: true

permissions:
  contents: read

jobs:
  publish:
    name: publish phux-protocol
    runs-on: ubuntu-latest
    # Required-reviewer gate on the irreversible step. Create the environment in
    # repo settings and scope CARGO_REGISTRY_TOKEN to it.
    environment: crates-io
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ inputs.tag }}
      - uses: DeterminateSystems/nix-installer-action@v22
      - uses: cachix/cachix-action@v15
        with:
          name: phux
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
          pushFilter: '(-source$|nixpkgs\.tar\.gz$)'

      - name: Check release version
        run: bash scripts/check-release-version.sh "${{ inputs.tag }}"

      - name: Package + verify (always)
        run: nix develop -c cargo publish --dry-run -p phux-protocol

      - name: Publish to crates.io
        if: ${{ inputs.dry_run == false }}
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: nix develop -c cargo publish -p phux-protocol
