# Build-timings report — on-demand compile-time observability.
#
# Why a separate, manual workflow instead of folding `--timings` into ci.yml:
# the ci jobs restore a warm `rust-cache`, and a warm build's timeline is
# near-empty (cached crates don't recompile). A meaningful critical-path
# report needs a COLD build, which would fight the cache and slow every PR.
# So this is its own lane: no cache, dispatch-triggered, builds from scratch,
# and uploads the HTML for download. Run it when a build feels slow or after
# a dependency change to see where the wall-clock actually goes.
#
# Reminder (matches `just timings`): the dominant cold-build cost is
# libghostty-vt's zig blob (a build.rs shell-out), which the Rust timeline
# attributes to that one crate's build-script run. The Rust-side critical
# path is what the rest of the timeline exposes.

name: build-timings

on:
  workflow_dispatch:
    inputs:
      profile:
        description: "Which profile to time."
        type: choice
        default: dev
        options:
          - dev
          - release
  # Uncomment to also capture a weekly trend:
  # schedule:
  #   - cron: "0 6 * * 1"  # Mondays 06:00 UTC

permissions:
  contents: read

jobs:
  timings:
    name: build timings (${{ inputs.profile || 'dev' }})
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@main
      # Deliberately NO rust-cache: a cold build is what makes the timeline
      # meaningful (warm crates don't recompile, so they vanish from it).

      - name: Build with --timings
        run: |
          set -euo pipefail
          profile="${{ inputs.profile || 'dev' }}"
          if [ "$profile" = "release" ]; then
            nix develop -c cargo build --workspace --release --timings
          else
            nix develop -c cargo build --workspace --all-targets --timings
          fi

      - name: Upload timing report
        uses: actions/upload-artifact@v4
        with:
          name: cargo-timings-${{ inputs.profile || 'dev' }}
          path: target/cargo-timings/
          if-no-files-found: error
