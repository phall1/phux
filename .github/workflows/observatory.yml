# Observatory — the deep, off-PR-path build observability lane (ADR-0047).
# Supersedes the old dispatch-only `build-timings` workflow with a superset:
#
#   * COLD `cargo build --timings` for both dev and release profiles. Cold on
#     purpose (no rust-cache): a warm build's timeline is near-empty, and the
#     interesting numbers — the critical path, libghostty-vt's zig build.rs
#     shell-out, the LTO/link wall inside the terminal units — only exist
#     from scratch. That is also why this never gates a PR.
#   * Release binary sizes + cargo-bloat by-crate attribution.
#   * Dependency-graph stats (locked crates, duplicate versions, proc-macros,
#     build scripts) — compile-free, from cargo metadata.
#
# Every job writes NDJSON records (scripts/ci/*.sh) into a `ci-metrics-*`
# artifact; the ci-metrics workflow folds them into the `ci-metrics` branch,
# so week-over-week trends live in DASHBOARD.md there, not in artifact
# archaeology. The raw --timings HTML is uploaded too for eyeballing.
#
# Triggers: weekly (the trend point), manual dispatch (when a build feels
# slow), and pushes to main that touch the lockfiles or the toolchain pin —
# the three files whose changes actually move cold-build cost.

name: observatory

on:
  schedule:
    - cron: "0 6 * * 1" # Mondays 06:00 UTC
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - Cargo.lock
      - flake.lock
      - rust-toolchain.toml

permissions:
  contents: read

concurrency:
  group: observatory-${{ github.ref }}
  cancel-in-progress: false

jobs:
  timings:
    name: cold build timings (${{ matrix.profile }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        profile: [dev, release]
    steps:
      - uses: actions/checkout@v7
      - uses: DeterminateSystems/nix-installer-action@v22
      - uses: cachix/cachix-action@v17
        with:
          name: phux
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
          pushFilter: '(-source$|nixpkgs\.tar\.gz$)'
      # Deliberately NO rust-cache — see the header.

      - name: Cold build with --timings
        env:
          PROFILE: ${{ matrix.profile }}
        run: |
          nix develop -c bash -euo pipefail <<'EOF'
          source scripts/ci/timed.sh
          if [ "$PROFILE" = "release" ]; then
            timed build-release cargo build --workspace --release --timings
          else
            timed build-dev cargo build --workspace --all-targets --timings
          fi
          EOF

      - name: Distill the timings report
        env:
          PROFILE: ${{ matrix.profile }}
        run: bash scripts/ci/parse-timings.sh target/cargo-timings/cargo-timing.html "$PROFILE"

      # Binary size rides the release leg: the artifacts already exist, so
      # cargo-bloat attributes without rebuilding. Needs the devshell for
      # cargo-bloat + jq.
      - name: Binary sizes + bloat attribution
        if: matrix.profile == 'release'
        run: nix develop -c bash scripts/ci/binary-size.sh

      - name: lane signal
        if: always()
        run: bash scripts/ci/summarize-job.sh

      - name: Upload timing report (HTML)
        uses: actions/upload-artifact@v7
        with:
          name: cargo-timings-${{ matrix.profile }}
          path: target/cargo-timings/
          if-no-files-found: error

      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: ci-metrics-observatory-${{ matrix.profile }}
          path: target/ci-metrics/
          if-no-files-found: ignore
          retention-days: 90

  deps:
    name: dependency stats
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: DeterminateSystems/nix-installer-action@v22
      - uses: cachix/cachix-action@v17
        with:
          name: phux
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
          pushFilter: '(-source$|nixpkgs\.tar\.gz$)'
      - name: Dependency-graph stats (compile-free)
        run: nix develop -c bash scripts/ci/dep-stats.sh
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: ci-metrics-deps
          path: target/ci-metrics/
          if-no-files-found: ignore
          retention-days: 90
