# phux release artifacts — build distributable binaries, attach them to an
# existing GitHub release, and refresh the Homebrew tap formula.
#
# Trigger: called by release-please.yml once release-please has pushed the tag
# and created the GitHub release. Also dispatchable by hand against an existing
# tag to re-build or re-attach assets.
#
# This workflow does NOT create tags and does NOT create or edit releases.
# release-please owns both, and owns the release body (the generated changelog).
# Assets are attached with `gh release upload`, which only adds files and never
# rewrites the notes — so the two workflows cannot fight over the release.
#
# It also does NOT publish to crates.io. Publishing is irreversible and nothing
# here is gated on a human, so phux-protocol goes out only via the manual
# publish-crate.yml dispatch.
#
# NOTE for anyone tempted to switch release-please to `release-type: rust`:
# it does not work on this repo. Its CargoToml updater throws
# "is not a package manifest" on our virtual workspace root (no [package]
# section), and throws "value at path package.version is not tagged" on every
# member crate because they all use `version.workspace = true`. The root
# Cargo.toml is bumped by a generic TOML jsonpath updater instead; see
# release-please-config.json.
#
# Release binaries are built with rustup plus the official Zig tarballs. Nix is
# useful for local development, but Nix-built release binaries can record
# `/nix/store` dynamic library paths and are not portable to ordinary hosts.
#
# CPU baseline caveat: libghostty-vt's build.rs lets zig auto-detect the host
# CPU for native builds, so Linux artifacts may carry instructions specific to
# the runner generation. aarch64-apple-darwin has a uniform baseline and is
# unaffected; Linux targets are best-effort until a pinned baseline is wired
# through libghostty-vt's build.

name: release

on:
  workflow_call:
    inputs:
      tag:
        description: "Existing tag to build and attach assets for (e.g. v0.1.0)."
        required: true
        type: string
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to build and attach assets for (e.g. v0.1.0). Must already exist."
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ inputs.tag }}
  cancel-in-progress: false

jobs:
  prepare:
    name: prepare release
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.version.outputs.tag }}
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Resolve version
        id: version
        shell: bash
        env:
          RELEASE_REF: ${{ inputs.tag }}
        run: |
          set -euo pipefail
          tag="${RELEASE_REF#refs/tags/}"
          if [[ ! "$tag" =~ ^v[0-9]+[.][0-9]+[.][0-9]+([-.][0-9A-Za-z][0-9A-Za-z.-]*)?$ ]]; then
            echo "::error::invalid release tag: ${tag}"
            exit 1
          fi
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          echo "version=${tag#v}" >> "$GITHUB_OUTPUT"

      - name: Require an existing release tag
        shell: bash
        env:
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          set -euo pipefail
          # release-please is the sole tag creator. This workflow only ever
          # attaches artifacts to a tag/release that already exists, so a
          # missing tag is an error rather than something to create.
          if ! git ls-remote --exit-code --tags origin "refs/tags/${TAG}" >/dev/null 2>&1; then
            echo "::error::tag ${TAG} does not exist. Tags are created by release-please when the release PR merges."
            exit 1
          fi

      - name: Check release version at tag
        shell: bash
        env:
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          set -euo pipefail
          git fetch --force --tags origin "refs/tags/${TAG}:refs/tags/${TAG}"
          git checkout --detach "refs/tags/${TAG}"
          bash scripts/check-release-version.sh "$TAG"

  build:
    name: build ${{ matrix.target }}
    needs: prepare
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            target: aarch64-apple-darwin
          # Build Linux on the oldest supported Ubuntu runner instead of
          # `ubuntu-latest` to keep the glibc baseline as low as GitHub's
          # hosted fleet currently allows.
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-22.04-arm
            target: aarch64-unknown-linux-gnu
    steps:
      - uses: actions/checkout@v7

      - name: Check out release tag
        shell: bash
        env:
          TAG: ${{ needs.prepare.outputs.tag }}
        run: |
          set -euo pipefail
          git fetch --force --tags origin "refs/tags/${TAG}:refs/tags/${TAG}"
          git checkout --detach "refs/tags/${TAG}"

      - name: Check release version
        shell: bash
        env:
          TAG: ${{ needs.prepare.outputs.tag }}
        run: bash scripts/check-release-version.sh "$TAG"

      - name: Install Zig
        shell: bash
        env:
          TARGET: ${{ matrix.target }}
          ZIG_VERSION: 0.15.2
        run: |
          set -euo pipefail
          case "$TARGET" in
            aarch64-apple-darwin)
              archive="zig-aarch64-macos-${ZIG_VERSION}.tar.xz"
              sha="3cc2bab367e185cdfb27501c4b30b1b0653c28d9f73df8dc91488e66ece5fa6b"
              ;;
            x86_64-unknown-linux-gnu)
              archive="zig-x86_64-linux-${ZIG_VERSION}.tar.xz"
              sha="02aa270f183da276e5b5920b1dac44a63f1a49e55050ebde3aecc9eb82f93239"
              ;;
            aarch64-unknown-linux-gnu)
              archive="zig-aarch64-linux-${ZIG_VERSION}.tar.xz"
              sha="958ed7d1e00d0ea76590d27666efbf7a932281b3d7ba0c6b01b0ff26498f667f"
              ;;
            *)
              echo "::error::unsupported Zig target: ${TARGET}"
              exit 1
              ;;
          esac
          curl -fsSLO "https://ziglang.org/download/${ZIG_VERSION}/${archive}"
          echo "${sha}  ${archive}" | shasum -a 256 -c -
          tar -xf "$archive"
          zig_dir="${archive%.tar.xz}"
          echo "${PWD}/${zig_dir}" >> "$GITHUB_PATH"
          "${zig_dir}/zig" version

      - name: Install Rust toolchain
        run: rustup toolchain install 1.90.0 --profile default

      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y pkg-config build-essential mold

      - name: Build release binaries
        run: cargo +1.90.0 build --release --bin phux --bin phux-mcp

      - name: Check macOS binary portability
        if: runner.os == 'macOS'
        shell: bash
        run: |
          set -euo pipefail
          for bin in target/release/phux target/release/phux-mcp; do
            if otool -L "$bin" | grep -F '/nix/store/'; then
              echo "::error::${bin} links to a Nix store library; release binaries must be portable."
              exit 1
            fi
          done

      - name: Package tarball
        id: package
        shell: bash
        env:
          TAG: ${{ needs.prepare.outputs.tag }}
          TARGET: ${{ matrix.target }}
        run: |
          set -euo pipefail
          tag="${TAG}"
          target="${TARGET}"
          stage="phux-${tag}-${target}"
          mkdir -p "${stage}"
          cp -f target/release/phux target/release/phux-mcp "${stage}/"
          cp -f README.md LICENSE-MIT LICENSE-APACHE "${stage}/"
          test -x "${stage}/phux"
          test -x "${stage}/phux-mcp"
          "${stage}/phux" --version
          "${stage}/phux-mcp" < /dev/null
          tar -czf "${stage}.tar.gz" "${stage}"
          # Portable sha256 (shasum on macOS, sha256sum on Linux).
          if command -v sha256sum >/dev/null; then
            sha=$(sha256sum "${stage}.tar.gz" | cut -d' ' -f1)
          else
            sha=$(shasum -a 256 "${stage}.tar.gz" | cut -d' ' -f1)
          fi
          echo "${sha}  ${stage}.tar.gz" > "${stage}.tar.gz.sha256"
          echo "artifact=${stage}.tar.gz" >> "$GITHUB_OUTPUT"

      - uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.target }}
          path: |
            phux-*.tar.gz
            phux-*.tar.gz.sha256
          if-no-files-found: error

  release:
    name: attach release artifacts
    needs: [prepare, build]
    # Attach whatever built: a single failed target shouldn't withhold the
    # others (`build` is fail-fast: false), so this deliberately does not
    # require `build` to have succeeded — download-artifact just collects what
    # exists. But `prepare` is the tag/version gate: if it failed, the tag is
    # missing or does not match Cargo's resolved versions, and there is nothing
    # legitimate to attach. Require it, or a bad tag surfaces as a confusing
    # "no build artifacts" error instead of the real cause.
    if: ${{ !cancelled() && needs.prepare.result == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true

      - name: Attach binaries to the release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          TAG: ${{ needs.prepare.outputs.tag }}
        run: |
          set -euo pipefail
          shopt -s nullglob
          assets=(dist/phux-*.tar.gz dist/phux-*.tar.gz.sha256)
          if (( ${#assets[@]} == 0 )); then
            echo "::error::no build artifacts to attach for ${TAG}"
            exit 1
          fi
          # `gh release upload` ADDS ASSETS ONLY. It never rewrites the release
          # name or body, so it cannot clobber the changelog release-please
          # generated. Do not swap this back to a create-release action.
          gh release upload "$TAG" "${assets[@]}" --clobber
          echo "attached ${#assets[@]} asset(s) to ${TAG}"

  homebrew:
    name: update homebrew tap
    needs: [prepare, release]
    if: ${{ !cancelled() && needs.release.result == 'success' }}
    runs-on: ubuntu-latest
    # Pushes Formula/phux.rb to phall1/homebrew-phux via an SSH deploy key
    # (HOMEBREW_TAP_DEPLOY_KEY: a private key whose public half is a
    # write-enabled deploy key on the tap repo). Skipped automatically if the
    # secret is unset, so the release still succeeds without it.
    steps:
      - name: Gate on deploy key
        id: gate
        env:
          HAS_DEPLOY_KEY: ${{ secrets.HOMEBREW_TAP_DEPLOY_KEY != '' }}
        run: |
          if [ "$HAS_DEPLOY_KEY" = "true" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "::warning::HOMEBREW_TAP_DEPLOY_KEY not set — skipping tap update."
          fi

      - name: Checkout phux (for the generator script)
        if: steps.gate.outputs.enabled == 'true'
        uses: actions/checkout@v7

      - uses: actions/download-artifact@v8
        if: steps.gate.outputs.enabled == 'true'
        with:
          path: dist
          merge-multiple: true

      - name: Checkout tap
        if: steps.gate.outputs.enabled == 'true'
        uses: actions/checkout@v7
        with:
          repository: phall1/homebrew-phux
          ssh-key: ${{ secrets.HOMEBREW_TAP_DEPLOY_KEY }}
          path: tap

      - name: Regenerate + push formula
        if: steps.gate.outputs.enabled == 'true'
        shell: bash
        env:
          TAG: ${{ needs.prepare.outputs.tag }}
        run: |
          set -euo pipefail
          mkdir -p tap/Formula
          bash scripts/gen-formula.sh "$TAG" dist tap/Formula/phux.rb
          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/phux.rb
          if git diff --cached --quiet; then
            echo "Formula already up to date."
          else
            git commit -m "phux ${TAG}"
            git push
          fi

# The `protocol-crate` job that used to live here is gone on purpose.
#
# It published phux-protocol to crates.io, gated behind a typed confirmation
# string ("publish phux-protocol"). Under release-please this workflow is
# triggered by automation, not by a human filling in a dispatch form, so that
# gate would have had nobody to type it — the confirmation would have had to be
# hardcoded or dropped, turning an irreversible publish into an automatic one.
#
# crates.io publishes are irreversible (a version can never be reused, a name
# never reclaimed), so it stays a separate, deliberate human action:
# publish-crate.yml, dispatched by hand with an explicit tag and dry_run
# defaulting to true.
