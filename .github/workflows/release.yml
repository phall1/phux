# phux release — create or verify a version tag, build distributable binaries,
# publish a GitHub release, refresh the Homebrew tap formula, and optionally
# publish phux-protocol to crates.io from the same button.
#
# Trigger: run manually with a `tag` input. Manual dispatch uses an existing
# tag, or creates it from the default branch if it does not already exist.
#
# Release binaries are built with rustup plus setup-zig. Nix is useful for local
# development, but Nix-built release binaries can record `/nix/store` dynamic
# library paths and are not portable to ordinary hosts.
#
# CPU baseline caveat: libghostty-vt's build.rs lets zig auto-detect the host
# CPU for native builds, so Linux artifacts may carry instructions specific to
# the runner generation. aarch64-apple-darwin has a uniform baseline and is
# unaffected; Linux targets are best-effort until a pinned baseline is wired
# through libghostty-vt's build.

name: release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v0.1.0). Created from main if missing."
        required: true
        type: string
      publish_protocol:
        description: "Also publish phux-protocol to crates.io. Irreversible."
        required: true
        type: boolean
        default: false
      crates_io_confirm:
        description: "Required when publishing crates.io: type `publish phux-protocol`."
        required: false
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ inputs.tag || github.ref_name }}
  cancel-in-progress: false

jobs:
  prepare:
    name: prepare release
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.version.outputs.tag }}
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0

      - name: Resolve version
        id: version
        shell: bash
        env:
          RELEASE_REF: ${{ inputs.tag || github.ref_name }}
        run: |
          set -euo pipefail
          ref="${RELEASE_REF}"
          case "$ref" in
            refs/tags/*) tag="${ref#refs/tags/}" ;;
            *) tag="$ref" ;;
          esac
          if [[ ! "$tag" =~ ^v[0-9]+[.][0-9]+[.][0-9]+([-.][0-9A-Za-z][0-9A-Za-z.-]*)?$ ]]; then
            echo "::error::invalid release tag: ${tag}"
            exit 1
          fi
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          echo "version=${tag#v}" >> "$GITHUB_OUTPUT"

      - name: Require default branch for manual releases
        if: github.event_name == 'workflow_dispatch'
        shell: bash
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          if [ "$REF_NAME" != "$DEFAULT_BRANCH" ]; then
            echo "::error::manual releases must be dispatched from ${DEFAULT_BRANCH}, got ${REF_NAME}"
            exit 1
          fi

      - name: Create or verify release tag
        shell: bash
        env:
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          set -euo pipefail
          if git ls-remote --exit-code --tags origin "refs/tags/${TAG}" >/dev/null 2>&1; then
            git fetch --force origin "refs/tags/${TAG}:refs/tags/${TAG}"
            echo "${TAG} already exists; release will use the tagged commit."
          else
            head_sha="$(git rev-parse HEAD)"
            bash scripts/check-release-version.sh "$TAG"
            git tag "$TAG" "$head_sha"
            git push origin "refs/tags/${TAG}"
          fi

      - name: Check release version at tag
        shell: bash
        env:
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          set -euo pipefail
          git fetch --force --tags origin "refs/tags/${TAG}:refs/tags/${TAG}"
          git checkout --detach "refs/tags/${TAG}"
          bash scripts/check-release-version.sh "$TAG"

  build:
    name: build ${{ matrix.target }}
    needs: prepare
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            target: aarch64-apple-darwin
          # Build Linux on the oldest supported Ubuntu runner instead of
          # `ubuntu-latest` to keep the glibc baseline as low as GitHub's
          # hosted fleet currently allows.
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-22.04-arm
            target: aarch64-unknown-linux-gnu
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Check out release tag
        shell: bash
        env:
          TAG: ${{ needs.prepare.outputs.tag }}
        run: |
          set -euo pipefail
          git fetch --force --tags origin "refs/tags/${TAG}:refs/tags/${TAG}"
          git checkout --detach "refs/tags/${TAG}"

      - name: Check release version
        shell: bash
        env:
          TAG: ${{ needs.prepare.outputs.tag }}
        run: bash scripts/check-release-version.sh "$TAG"

      - uses: mlugg/setup-zig@d1434d08867e3ee9daa34448df10607b98908d29
        with:
          version: 0.15.2

      - name: Install Rust toolchain
        run: rustup toolchain install 1.90.0 --profile default

      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y pkg-config build-essential mold

      - name: Build release binaries
        run: cargo +1.90.0 build --release --bin phux --bin phux-mcp

      - name: Check macOS binary portability
        if: runner.os == 'macOS'
        shell: bash
        run: |
          set -euo pipefail
          for bin in target/release/phux target/release/phux-mcp; do
            if otool -L "$bin" | grep -F '/nix/store/'; then
              echo "::error::${bin} links to a Nix store library; release binaries must be portable."
              exit 1
            fi
          done

      - name: Package tarball
        id: package
        shell: bash
        env:
          TAG: ${{ needs.prepare.outputs.tag }}
          TARGET: ${{ matrix.target }}
        run: |
          set -euo pipefail
          tag="${TAG}"
          target="${TARGET}"
          stage="phux-${tag}-${target}"
          mkdir -p "${stage}"
          cp -f target/release/phux target/release/phux-mcp "${stage}/"
          cp -f README.md LICENSE-MIT LICENSE-APACHE "${stage}/"
          tar -czf "${stage}.tar.gz" "${stage}"
          # Portable sha256 (shasum on macOS, sha256sum on Linux).
          if command -v sha256sum >/dev/null; then
            sha=$(sha256sum "${stage}.tar.gz" | cut -d' ' -f1)
          else
            sha=$(shasum -a 256 "${stage}.tar.gz" | cut -d' ' -f1)
          fi
          echo "${sha}  ${stage}.tar.gz" > "${stage}.tar.gz.sha256"
          echo "artifact=${stage}.tar.gz" >> "$GITHUB_OUTPUT"

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: ${{ matrix.target }}
          path: |
            phux-*.tar.gz
            phux-*.tar.gz.sha256
          if-no-files-found: error

  release:
    name: publish release
    needs: [prepare, build]
    # Publish whatever built: a single failed target shouldn't block the
    # release of the others. download-artifact below just collects what exists.
    if: ${{ !cancelled() }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          path: dist
          merge-multiple: true

      - name: Create / update GitHub release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65
        with:
          tag_name: ${{ needs.prepare.outputs.tag }}
          name: phux ${{ needs.prepare.outputs.tag }}
          generate_release_notes: true
          # A partial matrix still publishes whatever built — don't fail if a
          # target is missing (the glob still matches the ones that succeeded).
          fail_on_unmatched_files: false
          files: |
            dist/phux-*.tar.gz
            dist/phux-*.tar.gz.sha256

  homebrew:
    name: update homebrew tap
    needs: [prepare, release]
    if: ${{ !cancelled() && needs.release.result == 'success' }}
    runs-on: ubuntu-latest
    # Pushes Formula/phux.rb to phall1/homebrew-phux via an SSH deploy key
    # (HOMEBREW_TAP_DEPLOY_KEY: a private key whose public half is a
    # write-enabled deploy key on the tap repo). Skipped automatically if the
    # secret is unset, so the release still succeeds without it.
    steps:
      - name: Gate on deploy key
        id: gate
        env:
          HAS_DEPLOY_KEY: ${{ secrets.HOMEBREW_TAP_DEPLOY_KEY != '' }}
        run: |
          if [ "$HAS_DEPLOY_KEY" = "true" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "::warning::HOMEBREW_TAP_DEPLOY_KEY not set — skipping tap update."
          fi

      - name: Checkout phux (for the generator script)
        if: steps.gate.outputs.enabled == 'true'
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        if: steps.gate.outputs.enabled == 'true'
        with:
          path: dist
          merge-multiple: true

      - name: Checkout tap
        if: steps.gate.outputs.enabled == 'true'
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          repository: phall1/homebrew-phux
          ssh-key: ${{ secrets.HOMEBREW_TAP_DEPLOY_KEY }}
          path: tap

      - name: Regenerate + push formula
        if: steps.gate.outputs.enabled == 'true'
        shell: bash
        env:
          TAG: ${{ needs.prepare.outputs.tag }}
        run: |
          set -euo pipefail
          mkdir -p tap/Formula
          bash scripts/gen-formula.sh "$TAG" dist tap/Formula/phux.rb
          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/phux.rb
          if git diff --cached --quiet; then
            echo "Formula already up to date."
          else
            git commit -m "phux ${TAG}"
            git push
          fi

  protocol-crate:
    name: publish phux-protocol crate
    needs: [prepare, release]
    if: ${{ github.event_name == 'workflow_dispatch' && !cancelled() && needs.release.result == 'success' && inputs.publish_protocol == true }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ needs.prepare.outputs.tag }}

      - name: Confirm crates.io publish
        shell: bash
        env:
          CONFIRM: ${{ inputs.crates_io_confirm }}
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          set -euo pipefail
          if [ "$CONFIRM" != "publish phux-protocol" ]; then
            echo "::error::to publish crates.io, set crates_io_confirm to: publish phux-protocol"
            exit 1
          fi
          if [ -z "${CARGO_REGISTRY_TOKEN}" ]; then
            echo "::error::CARGO_REGISTRY_TOKEN is not set"
            exit 1
          fi

      - uses: DeterminateSystems/nix-installer-action@a7ad9c4f0c65208097f4d34f3cfa1913b80cce5c
      - uses: DeterminateSystems/magic-nix-cache-action@76aaf8814cdb385b86597c32b8c51b66b69b0839

      - name: Package + verify phux-protocol
        run: nix develop -c cargo publish --dry-run -p phux-protocol

      - name: Publish phux-protocol to crates.io
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: nix develop -c cargo publish -p phux-protocol
