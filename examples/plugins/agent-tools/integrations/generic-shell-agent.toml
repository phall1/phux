schema_version = 1
id = "generic-shell-agent"
display_name = "Generic Shell Agent"
kind = "terminal-agent"
description = "Template for any CLI assistant a team wants phux to launch and supervise."
package_version = "0.1.0"
package_status = "public-template"
first_party = true
capabilities = ["terminal-control", "session-supervision"]

[detect]
mode = "opt-in"
command = "sh"
env = "PHUX_AGENT_TOOLS_DETECT"

[link]
mode = "state-file"
default_session = "agent-bench-generic-shell-agent"

[session_identity]
mode = "phux"
native_env = "PHUX_GENERIC_AGENT_SESSION_ID"
restore = "phux-session"

# phux-r82.11: template for wrapping any CLI assistant so its pane
# self-declares a `phux.agent/v1` record (ADR-0040). Replace the name,
# kind, and the argv after `--` with your agent's; the wrapper writes the
# record at launch and clears it on exit. It targets its own pane via
# PHUX_TERMINAL_ID and writes nothing if it cannot resolve the pane (never
# a focused-pane guess).
#
# NOTE: phux has no launch executor yet, so nothing runs this `command`
# automatically today (see README "Automatic agent identity"). The path is
# anchored to ${PHUX_PLUGIN_ROOT} so it resolves from any cwd once a
# launcher exists — a relative `scripts/...` path did not.
[agent_identity]
name = "shell-agent"
kind = "generic"

[launch]
command = ["sh", "${PHUX_PLUGIN_ROOT}/scripts/phux-agent-wrap.sh", "--name", "shell-agent", "--kind", "generic", "--", "sh", "-lc", "echo configure this template with your agent command"]
working_directory = "plugin-root"
