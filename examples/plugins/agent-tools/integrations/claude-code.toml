schema_version = 1
id = "claude-code"
display_name = "Claude Code"
kind = "terminal-agent"
description = "Claude Code running as a terminal-native engineering agent."
package_version = "0.1.0"
package_status = "public"
first_party = true
capabilities = ["terminal-control", "code-editing", "human-question"]

[detect]
mode = "opt-in"
command = "claude"
env = "PHUX_AGENT_TOOLS_DETECT"

[link]
mode = "state-file"
default_session = "agent-bench-claude-code"

[session_identity]
mode = "native-or-phux"
native_env = "PHUX_CLAUDE_SESSION_ID"
restore = "external-cli"

# phux-r82.11: launch through the agent wrapper so the pane self-declares
# a `phux.agent/v1` record (ADR-0040) — name + kind — instead of the
# OSC-title substring heuristic. Clearing on exit is handled by the
# wrapper's trap. The wrapper targets its own pane via PHUX_TERMINAL_ID and
# writes nothing if it cannot resolve the pane (never a focused-pane guess).
#
# NOTE: `phux launch <id>` (ADR-0042) now runs this `command` as a pane's
# program, so an installed + enabled plugin makes `phux launch claude-code`
# open a self-identifying pane. The path is anchored to ${PHUX_PLUGIN_ROOT}
# (the launch executor expands it to the absolute plugin root before
# spawning), so the wrapper script resolves from any cwd while the agent
# itself runs in the caller's workspace (`working_directory = "workspace"`).
[agent_identity]
name = "claude"
kind = "claude"

[launch]
command = ["sh", "${PHUX_PLUGIN_ROOT}/scripts/phux-agent-wrap.sh", "--name", "claude", "--kind", "claude", "--", "claude"]
working_directory = "workspace"
