schema_version = 1
id = "gemini-cli"
display_name = "Gemini CLI"
kind = "terminal-agent"
description = "Gemini CLI running as a terminal-native coding assistant."
package_version = "0.1.0"
package_status = "public"
first_party = true
capabilities = ["terminal-control", "code-editing", "human-question"]

[detect]
mode = "opt-in"
command = "gemini"
env = "PHUX_AGENT_TOOLS_DETECT"

[link]
mode = "state-file"
default_session = "agent-bench-gemini-cli"

[session_identity]
mode = "native-or-phux"
native_env = "PHUX_GEMINI_SESSION_ID"
restore = "external-cli"

# phux-r82.11: launch through the agent wrapper so the pane self-declares
# a `phux.agent/v1` record (ADR-0040) — name + kind — instead of the
# OSC-title substring heuristic. Clearing on exit is handled by the
# wrapper's trap. The wrapper targets its own pane via PHUX_TERMINAL_ID and
# writes nothing if it cannot resolve the pane (never a focused-pane guess).
#
# NOTE: phux has no launch executor yet, so nothing runs this `command`
# automatically today (see README "Automatic agent identity" for how to
# activate the wrapper and the tracked follow-up). The path is anchored to
# ${PHUX_PLUGIN_ROOT} so it resolves from any cwd once a launcher exists —
# `working_directory = "workspace"` with a relative `scripts/...` path did
# not.
[agent_identity]
name = "gemini"
kind = "gemini"

[launch]
command = ["sh", "${PHUX_PLUGIN_ROOT}/scripts/phux-agent-wrap.sh", "--name", "gemini", "--kind", "gemini", "--", "gemini"]
working_directory = "plugin-root"
