schema_version = 1
id = "gemini-cli"
display_name = "Gemini CLI"
kind = "terminal-agent"
description = "Gemini CLI running as a terminal-native coding assistant."
package_version = "0.1.0"
package_status = "public"
first_party = true
capabilities = ["terminal-control", "code-editing", "human-question"]

[detect]
mode = "opt-in"
command = "gemini"
env = "PHUX_AGENT_TOOLS_DETECT"

[link]
mode = "state-file"
default_session = "agent-bench-gemini-cli"

[session_identity]
mode = "native-or-phux"
native_env = "PHUX_GEMINI_SESSION_ID"
restore = "external-cli"

# phux-r82.11: launch through the agent wrapper so the pane self-declares
# a `phux.agent/v1` record (ADR-0040) — name + kind land automatically, so
# the sidebar/fleet show a first-class identity instead of the OSC-title
# substring heuristic. Clearing on exit is handled by the wrapper's trap.
[agent_identity]
name = "gemini"
kind = "gemini"

[launch]
command = ["sh", "scripts/phux-agent-wrap.sh", "--name", "gemini", "--kind", "gemini", "--", "gemini"]
working_directory = "workspace"
