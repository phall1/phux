id = "com.phux.demo.agent-tools"
name = "phux Agent Tools Demo"
version = "0.1.0"
min_phux_version = "0.0.2"
description = "Local demo package for plugin discovery, action execution, and agent integration templates."
platforms = ["linux", "macos"]

[[actions]]
id = "inspect"
title = "Inspect agent workflow context"
description = "Prints the runtime context phux gives an agentic plugin action."
contexts = ["workspace", "pane"]
command = ["sh", "scripts/inspect.sh"]

[[actions]]
id = "list-integrations"
title = "List agent integration templates"
description = "Prints the checked-in agent templates this plugin can compose into a phux workflow."
contexts = ["workspace"]
command = ["sh", "scripts/list-integrations.sh"]

[[actions]]
id = "validate-integrations"
title = "Validate agent integration templates"
description = "Checks the demo agent templates without requiring any local agent installation."
contexts = ["workspace"]
command = ["sh", "scripts/validate-integrations.sh"]

[[actions]]
id = "status-integrations"
title = "Report agent integration package status"
description = "Reports first-party integration packages as current, outdated, or missing without requiring private credentials."
contexts = ["workspace"]
command = ["sh", "scripts/status-integrations.sh"]

[[actions]]
id = "link-integration"
title = "Link first-party agent integration packages"
description = "Links the selected public agent integration packages into the plugin-managed state directory."
contexts = ["workspace"]
command = ["sh", "scripts/link-integration.sh"]

[[actions]]
id = "unlink-integration"
title = "Unlink first-party agent integration packages"
description = "Removes the selected public agent integration package links from plugin-managed state."
contexts = ["workspace"]
command = ["sh", "scripts/unlink-integration.sh"]

[[actions]]
id = "detect-agents"
title = "Detect opted-in local agent CLIs"
description = "Probes configured agent commands only when PHUX_AGENT_TOOLS_DETECT=1 is set."
contexts = ["workspace"]
command = ["sh", "scripts/detect-agents.sh"]

[[actions]]
id = "launch-bench"
title = "Launch agent bench"
description = "Creates one phux session per configured agent role and records their targets."
contexts = ["workspace"]
command = ["sh", "scripts/launch-bench.sh"]

[[actions]]
id = "list-bench"
title = "List agent bench"
description = "Prints the current role/session/status table for the launched bench."
contexts = ["workspace"]
command = ["sh", "scripts/list-bench.sh"]

[[actions]]
id = "drive-bench"
title = "Drive agent bench role"
description = "Routes keys to the configured role target through phux send-keys."
contexts = ["workspace", "pane"]
command = ["sh", "scripts/drive-bench.sh"]

[[actions]]
id = "smoke-integrations"
title = "Smoke test first-party agent integrations"
description = "Runs package validation, link, status, detection, and unlink checks with fake public CLIs."
contexts = ["workspace"]
command = ["sh", "scripts/smoke-integrations.sh"]

[[agents]]
id = "codex"
label = "Codex"
state = "unknown"
attention = "normal"
contexts = ["workspace"]

[[agents]]
id = "claude-code"
label = "Claude Code"
state = "unknown"
attention = "normal"
contexts = ["workspace"]

[[agents]]
id = "gemini-cli"
label = "Gemini CLI"
state = "unknown"
attention = "normal"
contexts = ["workspace"]

[[panes]]
id = "agent-board"
title = "Agent Board"
description = "Lists the agent integrations available to a composed workspace."
placement = "split"
command = ["sh", "scripts/list-integrations.sh"]

[[panes]]
id = "agent-role"
title = "Agent Role"
description = "A terminal-native agent role session managed by the bench launcher."
placement = "split"
command = ["sh"]

[[workspaces]]
id = "agent-bench"
title = "Agent Bench"
description = "Composes local agent integration helpers into a herdr-like workspace profile."
contexts = ["workspace"]
agents = ["codex", "claude-code", "gemini-cli"]
actions = ["inspect", "list-integrations", "validate-integrations", "status-integrations", "link-integration", "unlink-integration", "detect-agents", "launch-bench", "list-bench", "drive-bench", "smoke-integrations"]

[[workspaces.panes]]
id = "board"
pane = "agent-board"
role = "board"

[[workspaces.panes]]
id = "codex"
pane = "agent-role"
role = "codex"

[[workspaces.panes]]
id = "claude-code"
pane = "agent-role"
role = "claude-code"

[[workspaces.panes]]
id = "gemini-cli"
pane = "agent-role"
role = "gemini-cli"
