id = "com.phux.demo.continuum"
name = "phux Continuum Demo"
version = "0.1.0"
min_phux_version = "0.0.2"
description = "Example package for tmux-continuum-style workspace autosave and restore."
platforms = ["linux", "macos"]

[[actions]]
id = "autosave"
title = "Autosave workspace"
description = "Writes the current phux workspace archive for the configured profile."
contexts = ["workspace"]
command = ["sh", "scripts/autosave.sh"]

[[actions]]
id = "restore-latest"
title = "Restore latest workspace"
description = "Restores missing sessions from the latest saved profile archive."
contexts = ["workspace"]
command = ["sh", "scripts/restore-latest.sh"]

[[events]]
id = "idle-autosave"
title = "Autosave on idle"
on = "pane.idle"
command = ["sh", "scripts/autosave.sh"]

[[events]]
id = "session-autosave"
title = "Autosave on session changes"
on = "session.changed"
command = ["sh", "scripts/autosave.sh"]

[[workspaces]]
id = "continuum"
title = "Continuum"
description = "Surfaces autosave and restore actions for a durable phux workspace profile."
contexts = ["workspace"]
actions = ["autosave", "restore-latest"]
events = ["idle-autosave", "session-autosave"]
