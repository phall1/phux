# cargo-deny configuration.
# https://embarkstudios.github.io/cargo-deny/

[graph]
all-features = true

[advisories]
yanked = "deny"
# No advisories are currently ignored. The previous ignores
# (RUSTSEC-2017-0008 for the unmaintained `serial` crate, RUSTSEC-2024-0436
# for the unmaintained `paste` crate) are no longer needed: portable-pty 0.9
# uses the maintained `serial2` crate, and ratatui 0.30 dropped `paste`.
ignore = []

[licenses]
allow = [
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "MIT",
    "MPL-2.0",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Zlib",
]
confidence-threshold = 0.93

[bans]
multiple-versions = "warn"
wildcards = "deny"
# Workspace-internal crates pin each other with version = "0.0.0", which
# cargo-deny otherwise reports as a wildcard. Per cargo-deny docs this is
# the canonical opt-out for intra-workspace path deps.
allow-wildcard-paths = true
deny = []

[sources]
unknown-registry = "deny"
unknown-git = "deny"
# libghostty-vt / libghostty-vt-sys are intentionally consumed from git
# per ADR-0008 (use libghostty types directly). Track upstream until
# crates.io releases catch up. The phall1 fork vendors phall1/ghostty's
# resize-overflow fix (phux-y06, "fix: resize overflow") until it lands
# on ghostty-org/ghostty.
allow-git = [
    "https://github.com/Uzaaft/libghostty-rs",
    "https://github.com/uzaaft/libghostty-rs",
    "https://github.com/phall1/libghostty-rs",
]
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
